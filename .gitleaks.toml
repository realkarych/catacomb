title = "catacomb gitleaks config"

[extend]
useDefault = true

# Whole-file fixtures: every interesting line exists to carry a fake secret, so
# there is no per-line distinction left worth preserving. A path entry is the
# right tool here precisely because the file holds nothing else to scan.
[[allowlists]]
description = "Test fixtures and redaction tables intentionally contain fake secrets"
paths = [
  '''redact/.*_test\.go''',
  # Redaction test asserts fake secrets in Run.Labels/Repro.Cwd are scrubbed on export.
  '''export/jsonl/.*_test\.go''',
  '''redact/testdata/.*''',
  '''reduce/testdata/.*''',
  '''regress/testdata/.*''',
  '''bench/testdata/.*''',
  '''cmd/catacomb/testdata/.*''',
  # Two deleted webui Playwright specs whose SSE fixtures use fake repeated-hex
  # step/phase keys (e.g. a1b2c3d4e5f6...); scoped to the exact files — not e2e/.* —
  # so real-secret scanning stays enabled across e2e/ and the rest of webui/e2e/.
  '''webui/e2e/eval-node-fields\.spec\.ts''',
  '''webui/e2e/eval-markers\.spec\.ts''',
]

# The blocks below deliberately carry NO `paths`, and must not gain any.
#
# In a directory scan (`detect --no-git`) a global-allowlist `paths` match makes
# the walker skip the entire file before a single rule runs — see shouldSkipPath
# in gitleaks' sources/files.go. `condition = "AND"` is never consulted on that
# code path, so pairing `paths` with `regexes` does NOT narrow anything there: it
# silently degrades to the blanket file exemption it was meant to replace, and
# the scan goes green while enforcing nothing. Git-mode scans (the PR commit
# range, and the full history the weekly schedule walks) do honour AND, so a
# path-scoped block would also mean two different behaviours in the two modes.
#
# Keeping these regex-only gives one behaviour everywhere: only the individual
# finding whose text matches is exempt; every other line of the same file, and
# every other secret on the same line, is still scanned. The regexes are exact
# enough that repo-wide scope costs nothing.

[[allowlists]]
description = "step_key/phase_key values are content hashes over the canonical action graph, not credentials"
# Targets the matched field rather than the line: the deepeval fixtures are
# compact JSONL, so a line-scoped regex would shadow every other field in the
# same record. The 16-hex form appears in guide prose, the 32-hex form in the
# exported-snapshot fixtures under integrations/deepeval/tests/testdata/.
regexTarget = "match"
regexes = [
  '''step_key": "[0-9a-f]{16}"''',
  '''step_key":"[0-9a-f]{32}"''',
]

[[allowlists]]
description = "Design-plan docs illustrate the redaction feature with deliberately fake credentials in Go code fences"
# Matched against the secret itself (the default regexTarget) and anchored, so
# only these four exact literals are exempt — any other secret in those docs, or
# anywhere else, still fails the gate. Each is an alphabet or keyboard walk with
# a vendor prefix bolted on, which is why the scanner bites and why none of them
# is a credential:
#   abcdefghij1234567890             a-j then 1-0, a Bearer-token placeholder
#   a1B2c3D4e5F6g7H8j9K0mN1pQ2rS3tU4 alternating digit/letter walk, entropy-gate input
#   sk_live_ABCDEFGHIJKLMNOP0123     A-P then 0123 after the Stripe prefix
#   AKIAABCDEFGHIJKLMNOP             A-P after the AWS prefix
# Being path-free, these also cover the same two docs at docs/superpowers/plans/,
# where they were originally committed before the rename to docs/internal/ —
# which is the path a git-history scan still sees.
regexes = [
  '''^abcdefghij1234567890$''',
  '''^a1B2c3D4e5F6g7H8j9K0mN1pQ2rS3tU4$''',
  '''^sk_live_ABCDEFGHIJKLMNOP0123$''',
  '''^AKIAABCDEFGHIJKLMNOP$''',
]
