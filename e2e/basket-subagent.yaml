# Live subagent basket: does delegating the SQL task to a subagent show up as a real
# "type":"subagent" node in bench evidence? It does. Claude Code writes each subagent's
# turns to subagents/agent-*.jsonl sub-transcripts; bench snapshots them into the run dir
# next to session.jsonl; and the offline pipeline reduces the main session and the
# sub-transcripts TOGETHER, synthesizing the subagent node. 1 task x 3 variants x 5
# reps = 15 live cells. Delegation is FORCED structurally per variant via SUBAGENT_TOOLS
# (the wrapper's --allowedTools), not left to the model: baseline/baseline2 get ONLY "Task"
# (no Bash) so the main agent physically cannot run sqlite3 itself and MUST spawn a subagent
# (subagents/ dir + subagent node present every run); degraded gets "Bash(sqlite3:*)" (no
# Task) so it is forced inline (no subagents/ dir -> no subagent node — seeded delegation
# regression).
#
# The gate is that catacomb reduces a real subagent node from the FULL evidence
# (session.jsonl + subagents/agent-*.jsonl) in baseline and not in degraded. SQL correctness
# is NOT asserted here: with --allowedTools "Task" only, the spawned subagent has no tools
# and cannot write out/result.csv, so there is no artifact to verify — the SQL verifier
# contract is the separate sql basket. The `import` entry point on interactive sessions is
# exercised separately by the import scenario.
basket: e2e-subagent
reps: 5
tasks:
  - id: subagent
    cmd: ["./subagent.sh"]
    workspace:
      cmd: ["sh", "-c", "cp \"$E2E_DIR\"/subagent.sh ."]
    timeout: 300s
    env:
      CHILD_MODEL: claude-sonnet-5
variants:
  - id: baseline
    env:
      SUBAGENT_TOOLS: "Task"
      SUBAGENT_INSTRUCTION: "You have ONLY the Task tool. You cannot run commands yourself. Spawn a subagent (call the Task tool with subagent_type general-purpose) and have it run the sqlite3 query and write out/result.csv."
  - id: degraded
    env:
      SUBAGENT_TOOLS: "Bash(sqlite3:*)"
      SUBAGENT_INSTRUCTION: "Run the sqlite3 query yourself, directly. Do not delegate."
  - id: baseline2
    env:
      SUBAGENT_TOOLS: "Task"
      SUBAGENT_INSTRUCTION: "You have ONLY the Task tool. You cannot run commands yourself. Spawn a subagent (call the Task tool with subagent_type general-purpose) and have it run the sqlite3 query and write out/result.csv."
