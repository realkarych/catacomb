# zizmor configuration — https://docs.zizmor.sh/configuration/
#
# publish.yml ignores: the release workflow is being replaced wholesale by a
# GoReleaser pipeline; its findings are inherited from the old workflow and the
# replacement must be re-audited. Remove every publish.yml ignore once the
# GoReleaser workflow lands and fix findings there instead.
#
# adhoc-packages ignores: the flagged installs are all version-pinned
# (markdownlint-cli@0.49.0, @anthropic-ai/claude-code@2.1.207, zizmor==1.26.1),
# which is the mitigation the audit asks for.
rules:
  unpinned-uses:
    ignore:
      - publish.yml
  template-injection:
    ignore:
      - publish.yml
  cache-poisoning:
    ignore:
      - publish.yml
  excessive-permissions:
    ignore:
      - publish.yml
  artipacked:
    ignore:
      - publish.yml
  superfluous-actions:
    ignore:
      - publish.yml
  adhoc-packages:
    ignore:
      - ci.yml
      - e2e-live.yml
      - security.yml
