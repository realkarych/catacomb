# E2E Live Gate — runs the PV-6b calibration methodology against the real
# `claude -p` CLI in CI (see docs/reviews/2026-07-08-pv6b-live-calibration.md and
# e2e/run.sh). It is deliberately NOT part of the per-PR CI: it spends real API
# budget (~$1 per run — 45 live bench cells; the checkpoint task runs on sonnet) and needs
# an Anthropic auth secret: either `ANTHROPIC_API_KEY` (API billing) or
# `CLAUDE_CODE_OAUTH_TOKEN` (a Claude Pro/Max subscription; generate it with
# `claude setup-token`). When both are set the API key takes precedence (API billing).
# Trigger it manually (workflow_dispatch) or let the weekly schedule run it; the guard
# step fails fast with a clear message when neither is set so a fork or an unconfigured
# repo does not burn a confusing red run.
name: E2E Live Gate

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — a weekly canary over the live gate.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: e2e-live
  # never cancel a run that is already spending API budget
  cancel-in-progress: false

jobs:
  e2e-live:
    name: E2E live gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Require an Anthropic auth secret
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ] && [ "$HAS_OAUTH" != "true" ]; then
            echo "::error::No Anthropic auth secret is set. This workflow makes real 'claude -p' calls and needs one of two repository secrets: ANTHROPIC_API_KEY (API billing) or CLAUDE_CODE_OAUTH_TOKEN (a Claude Pro/Max subscription; generate it with 'claude setup-token'). Add either in repo settings, then re-run." >&2
            exit 1
          fi
          if [ "$HAS_KEY" = "true" ] && [ "$HAS_OAUTH" = "true" ]; then
            echo "ANTHROPIC_API_KEY and CLAUDE_CODE_OAUTH_TOKEN are both present (the API key takes precedence)."
          elif [ "$HAS_KEY" = "true" ]; then
            echo "ANTHROPIC_API_KEY is present."
          else
            echo "CLAUDE_CODE_OAUTH_TOKEN is present."
          fi

      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install Claude Code CLI
        # Pinned to the live-validated CLI version; bump deliberately after a green
        # dispatch on the new version.
        run: npm install -g @anthropic-ai/claude-code@2.1.207

      - name: Build catacomb
        run: make build

      - name: Put catacomb on PATH
        run: echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Run E2E live gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # keep the non-interactive claude run quiet and deterministic in CI
          DISABLE_AUTOUPDATER: "1"
          DISABLE_TELEMETRY: "1"
          DISABLE_ERROR_REPORTING: "1"
        # A missing GitHub secret materializes as an empty-but-set env var, and an empty
        # ANTHROPIC_API_KEY still WINS auth precedence over a valid OAuth token — so drop
        # any empty var before invoking the harness so the present one is actually used.
        run: |
          [ -n "${ANTHROPIC_API_KEY:-}" ] || unset ANTHROPIC_API_KEY
          [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ] || unset CLAUDE_CODE_OAUTH_TOKEN
          bash e2e/run.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-live-artifacts
          path: e2e-artifacts/
          if-no-files-found: warn
