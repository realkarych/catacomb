# E2E Live Gate — runs the PV-6b calibration methodology against the real
# `claude -p` CLI in CI (see docs/reviews/2026-07-08-pv6b-live-calibration.md and
# e2e/run.sh). It is deliberately NOT part of the per-PR CI: it spends real API
# budget (~$3–7 per run — 105 live bench cells (adds subagent/skill/mcp production
# baskets on sonnet; subagent cells spawn child agents so per-cell cost is higher —
# treat as an estimate to confirm on the first dispatch); see e2e/run.sh's header for
# the authoritative cost/scope figures) and needs
# an Anthropic auth secret: either `ANTHROPIC_API_KEY` (API billing) or
# `CLAUDE_CODE_OAUTH_TOKEN` (a Claude Pro/Max subscription; generate it with
# `claude setup-token`). When both are set the API key takes precedence (API billing).
# Trigger it manually (workflow_dispatch) or let the twice-weekly schedule run it; the guard
# step fails fast with a clear message when neither is set so a fork or an unconfigured
# repo does not burn a confusing red run.
# An OPTIONAL codex leg (6 live `codex exec` cells on gpt-5.4-mini, ~$0.05 extra when
# enabled) runs when the `CODEX_API_KEY` secret is set; without it (or without the codex
# CLI) run.sh's auth probe fails and the leg SKIPS cleanly — never a red run.
name: E2E Live Gate

on:
  workflow_dispatch:
  schedule:
    # Mondays and Thursdays 06:00 UTC — a twice-weekly canary over the live gate,
    # so drift surfaces within ~3 days instead of ~7.
    - cron: "0 6 * * 1,4"

permissions:
  contents: read

concurrency:
  group: e2e-live
  # never cancel a run that is already spending API budget
  cancel-in-progress: false

jobs:
  e2e-live:
    name: E2E live gate
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Require an Anthropic auth secret
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ] && [ "$HAS_OAUTH" != "true" ]; then
            echo "::error::No Anthropic auth secret is set. This workflow makes real 'claude -p' calls and needs one of two repository secrets: ANTHROPIC_API_KEY (API billing) or CLAUDE_CODE_OAUTH_TOKEN (a Claude Pro/Max subscription; generate it with 'claude setup-token'). Add either in repo settings, then re-run." >&2
            exit 1
          fi
          if [ "$HAS_KEY" = "true" ] && [ "$HAS_OAUTH" = "true" ]; then
            echo "ANTHROPIC_API_KEY and CLAUDE_CODE_OAUTH_TOKEN are both present (the API key takes precedence)."
          elif [ "$HAS_KEY" = "true" ]; then
            echo "ANTHROPIC_API_KEY is present."
          else
            echo "CLAUDE_CODE_OAUTH_TOKEN is present."
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Claude Code CLI
        # Pinned to the live-validated CLI version; bump deliberately after a green
        # dispatch on the new version.
        run: npm install -g @anthropic-ai/claude-code@2.1.207 # zizmor: ignore[adhoc-packages] version-pinned

      - name: Install Codex CLI (optional codex leg)
        # Pinned like the claude CLI. Install failure must never fail the claude gate:
        # run.sh's codex gate simply skips when the binary is missing.
        run: npm install -g @openai/codex@0.144.5 || echo "::warning::codex CLI install failed; the optional codex leg will skip" # zizmor: ignore[adhoc-packages] version-pinned

      - name: Build catacomb
        run: make build

      - name: Put catacomb on PATH
        run: echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Run E2E live gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # optional codex leg: exported unconditionally — when the secret is absent the
          # var is empty, run.sh's auth probe fails, and the leg skips cleanly
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          # keep the non-interactive claude run quiet and deterministic in CI
          DISABLE_AUTOUPDATER: "1"
          DISABLE_TELEMETRY: "1"
          DISABLE_ERROR_REPORTING: "1"
        # A missing GitHub secret materializes as an empty-but-set env var, and an empty
        # ANTHROPIC_API_KEY still WINS auth precedence over a valid OAuth token — so drop
        # any empty var before invoking the harness so the present one is actually used.
        run: |
          [ -n "${ANTHROPIC_API_KEY:-}" ] || unset ANTHROPIC_API_KEY
          [ -n "${CLAUDE_CODE_OAUTH_TOKEN:-}" ] || unset CLAUDE_CODE_OAUTH_TOKEN
          [ -n "${CODEX_API_KEY:-}" ] || unset CODEX_API_KEY
          bash e2e/run.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-live-artifacts
          path: e2e-artifacts/
          if-no-files-found: warn
