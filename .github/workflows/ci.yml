name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  lint-go:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
          args: --timeout=5m

  lint-docs:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
      - name: Install markdownlint
        run: npm install -g markdownlint-cli@0.49.0
      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-go
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Build
        shell: bash
        run: go build ./...
      - name: Test
        shell: bash
        run: go test ./...

  frontend:
    name: Frontend (vitest + playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests + coverage gate
        run: npm run test
      - name: Build
        run: npm run build
      - name: Verify committed dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::webui/dist is stale — rebuild and commit the result"
            git --no-pager diff --stat dist
            exit 1
          fi
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: E2E
        run: npm run test:e2e

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: lint-go
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Test with coverage
        run: go test -race -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Enforce coverage threshold
        run: go run github.com/vladopajic/go-test-coverage/v2@v2.18.8 --config=.testcoverage.yml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: unittests
