name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  lint-go:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          args: --timeout=5m

  lint-docs:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: latest
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Lint Markdown
        run: markdownlint '**/*.md' --ignore node_modules

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-go
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Download dependencies
        run: go mod download
      - name: Build
        shell: bash
        run: go build ./...
      - name: Test
        shell: bash
        run: go test ./...

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: lint-go
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
      - name: Test with coverage
        run: go test -race -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Enforce coverage threshold
        run: go run github.com/vladopajic/go-test-coverage/v2@latest --config=.testcoverage.yml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: unittests
