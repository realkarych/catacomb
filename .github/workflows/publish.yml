name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'SemVer tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: Extract tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >>"$GITHUB_OUTPUT"
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >>"$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ steps.tag.outputs.TAG }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

      - name: Smoke-test image
        run: |
          docker run --rm \
            ghcr.io/realkarych/catacomb:${{ steps.tag.outputs.TAG }} \
            version

  update-apt:
    needs: goreleaser
    runs-on: ubuntu-latest

    env:
      TAG: ${{ needs.goreleaser.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2 aptly

      - name: Download .deb packages
        run: |
          mkdir -p deb
          gh release download "$TAG" -R realkarych/catacomb -D deb -p "*.deb"

      - name: Import GPG
        env:
          GPG_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: echo "$GPG_KEY" | gpg --batch --import

      - name: Checkout APT pages
        uses: actions/checkout@v7.0.0
        with:
          repository: realkarych/catacomb-apt
          token: ${{ secrets.DEB_TOKEN }}
          path: apt
          ref: gh-pages

      - name: Publish repo
        run: |
          cd apt
          aptly repo create -distribution=stable -component=main catacomb || true
          aptly repo add catacomb ../deb/*.deb
          KEYID=$(gpg --list-keys --with-colons | awk -F: '/^pub/ {print $5; exit}')
          aptly publish repo -architectures="amd64,arm64" -gpg-key="$KEYID" catacomb
          cp -r ~/.aptly/public/* .
          rm -rf ~/.aptly

      - name: Commit & push APT repo
        run: |
          cd apt
          git config user.name github-actions
          git config user.email noreply@github.com
          git add .
          git commit -m "APT release ${TAG}" || echo "no changes"
          git push origin HEAD:gh-pages
