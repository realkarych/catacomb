name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'SemVer tag to release (e.g. v0.1.0)'
        required: true

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Extract tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "TAG=$INPUT_TAG" >>"$GITHUB_OUTPUT"
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >>"$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Assert tag descends from master
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          SHA=$(git rev-parse "refs/tags/${TAG}^{commit}")
          echo "release commit: $SHA"
          if ! git merge-base --is-ancestor "$SHA" origin/master; then
            echo "::error::tag ${TAG} (${SHA}) is not an ancestor of origin/master; refusing to release"
            exit 1
          fi

      - name: Assert required checks succeeded
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse "refs/tags/${TAG}^{commit}")
          required=(
            "Coverage gate"
            "Tests (ubuntu-latest)"
            "Tests (macos-latest)"
            "Tests (windows-latest)"
            "Hermetic E2E"
            "golangci-lint"
            "gosec"
            "govulncheck"
            "gitleaks"
            "CodeQL"
          )
          runs=$(gh api --paginate "repos/${REPO}/commits/${SHA}/check-runs" \
            -q '.check_runs[] | "\(.name)\t\(.conclusion)"')
          failed=0
          for name in "${required[@]}"; do
            if printf '%s\n' "$runs" | grep -Fxq "${name}"$'\t'"success"; then
              echo "ok: ${name}"
            else
              conclusion=$(printf '%s\n' "$runs" \
                | awk -F'\t' -v n="$name" '$1 == n { print $2; exit }')
              echo "::error::required check '${name}' did not succeed on ${SHA} (conclusion: ${conclusion:-missing})"
              failed=1
            fi
          done
          exit "$failed"

  goreleaser:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      packages: write
      id-token: write
    outputs:
      tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - name: Extract tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "TAG=$INPUT_TAG" >>"$GITHUB_OUTPUT"
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >>"$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.tag.outputs.TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}

      - name: Smoke-test image
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          docker run --rm \
            "ghcr.io/realkarych/catacomb:${TAG}" \
            version

  update-apt:
    needs: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read

    env:
      TAG: ${{ needs.goreleaser.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2 aptly

      - name: Download .deb packages
        run: |
          mkdir -p deb
          gh release download "$TAG" -R realkarych/catacomb -D deb -p "*.deb"

      - name: Import GPG
        env:
          GPG_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: echo "$GPG_KEY" | gpg --batch --import

      # Persisted credentials are required here — the "Commit & push APT repo"
      # step pushes to gh-pages with the DEB_TOKEN this checkout configures;
      # nothing uploads the workspace as an artifact.
      - name: Checkout APT pages # zizmor: ignore[artipacked]
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: realkarych/catacomb-apt
          token: ${{ secrets.DEB_TOKEN }}
          path: apt
          ref: gh-pages

      - name: Publish repo
        run: |
          cd apt
          aptly repo create -distribution=stable -component=main catacomb || true
          aptly repo add catacomb ../deb/*.deb
          KEYID=$(gpg --list-keys --with-colons | awk -F: '/^pub/ {print $5; exit}')
          aptly publish repo -architectures="amd64,arm64" -gpg-key="$KEYID" catacomb
          cp -r ~/.aptly/public/* .
          rm -rf ~/.aptly

      - name: Commit & push APT repo
        run: |
          cd apt
          git config user.name github-actions
          git config user.email noreply@github.com
          git add .
          git commit -m "APT release ${TAG}" || echo "no changes"
          git push origin HEAD:gh-pages

  verify-channels:
    needs: [goreleaser, update-apt]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read

    env:
      TAG: ${{ needs.goreleaser.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Assert release assets present
        run: |
          assets=$(gh release view "$TAG" -R realkarych/catacomb --json assets -q '.assets[].name')
          echo "$assets"
          printf '%s\n' "$assets" | grep -Fq "checksums.txt" || { echo "::error::missing checksums.txt"; exit 1; }
          printf '%s\n' "$assets" | grep -Eq 'catacomb_linux_amd64\.tar\.gz' || { echo "::error::missing linux archive"; exit 1; }
          printf '%s\n' "$assets" | grep -Eq 'checksums\.txt\.sigstore\.json' || { echo "::error::missing sigstore bundle"; exit 1; }

      - name: Assert Homebrew cask matches tag
        run: |
          ver="${TAG#v}"
          got=""
          for i in $(seq 1 10); do
            got=$(gh api repos/realkarych/homebrew-tap/contents/Casks/catacomb.rb \
              -q '.content' | base64 -d | sed -n 's/^  version "\(.*\)"/\1/p')
            [ "$got" = "$ver" ] && { echo "cask ok: $got"; break; }
            echo "cask has $got, want $ver (retry $i)"; sleep 15
          done
          [ "$got" = "$ver" ] || { echo "::error::cask version $got != $ver"; exit 1; }

      - name: Assert GHCR latest == tag digest
        run: |
          dt=$(gh api "/users/realkarych/packages/container/catacomb/versions" \
            -q "[.[] | select(.metadata.container.tags[]? == \"$TAG\")][0].name")
          dl=$(gh api "/users/realkarych/packages/container/catacomb/versions" \
            -q "[.[] | select(.metadata.container.tags[]? == \"latest\")][0].name")
          echo "tag digest=$dt latest digest=$dl"
          [ -n "$dt" ] && [ "$dt" = "$dl" ] || { echo "::error::ghcr latest ($dl) != $TAG ($dt)"; exit 1; }
