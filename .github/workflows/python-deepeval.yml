name: Python — adapters

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-deepeval:
    name: pytest (Python 3.12 + deepeval)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: integrations/deepeval
    env:
      DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package with test-full extras
        run: pip install -e '.[test-full]' ruff==0.15.21 mypy==2.3.0
      - name: Lint and type-check
        run: |
          ruff check .
          mypy src
      - name: Run tests
        run: pytest -q

  verifier-sdk:
    name: pytest (Python 3.12 + verifier-sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: integrations/verifier
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package with test extras
        run: pip install -e '.[test]' ruff==0.15.21 mypy==2.3.0
      - name: Lint and type-check
        run: |
          ruff check .
          mypy src
      - name: Run tests
        run: pytest -q

  judge-sdk:
    name: pytest (Python 3.12 + judge-sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: integrations/judge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package with test extras
        run: pip install -e '.[test]'
      - name: Run tests
        run: pytest -q
