name: Python — adapters

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-deepeval:
    name: pytest (Python 3.12 + deepeval)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: integrations/deepeval
    env:
      DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package with test-full extras
        run: pip install -e '.[test-full]' ruff==0.15.21 mypy==2.3.0
      - name: Lint and type-check
        run: |
          ruff check .
          mypy src
      - name: Run tests
        run: pytest -q

  verifier-sdk:
    name: pytest (Python 3.12 + verifier-sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: integrations/verifier
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package with test extras
        run: pip install -e '.[test]' ruff==0.15.21 mypy==2.3.0
      - name: Lint and type-check
        run: |
          ruff check .
          mypy src
      - name: Run tests
        run: pytest -q

  judge-sdk:
    name: pytest (Python 3.12 + judge-sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: integrations/judge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package with test extras
        run: pip install -e '.[test]'
      - name: Run tests
        run: pytest -q

  seam:
    name: export→deepeval seam (Go build + real metric)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build catacomb
        run: make build
      - name: Install catacomb-deepeval with the deepeval extra
        run: pip install -e 'integrations/deepeval[deepeval]'
      - name: Export the seam fixture to a JSONL snapshot
        run: bin/catacomb export integrations/deepeval/tests/testdata/seam_session.jsonl --to jsonl --out seam.jsonl
      - name: PASS — every expected tool was called (exit 0)
        run: catacomb-deepeval seam.jsonl --expected integrations/deepeval/tests/testdata/seam_expected_pass.json
      - name: FAIL — an expected tool was never called (exit 1)
        run: |
          if catacomb-deepeval seam.jsonl --expected integrations/deepeval/tests/testdata/seam_expected_fail.json; then
            echo "::error::expected a FAIL (exit 1) from catacomb-deepeval but it exited 0" >&2
            exit 1
          fi
